name: Lean 4 CI — Formal Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Build & Verify (Lean 4)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Verify Lean version
        run: |
          lean --version
          lake --version

      - name: Cache Mathlib4
        uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            lean-

      - name: Fetch Mathlib cache
        run: lake exe cache get || true

      - name: Build all modules
        run: lake build

      - name: Run comprehensive audit
        run: python3 verify.py

      - name: Verify zero axioms and sorrys in AlienMath
        run: |
          echo "=== Checking for active axiom/sorry in Agora/AlienMath/ ==="
          AXIOMS=$(grep -rn '^\s*axiom\b' Agora/AlienMath/ || true)
          SORRYS=$(grep -rn '^\s*sorry\b' Agora/AlienMath/ || true)
          if [ -n "$AXIOMS" ]; then
            echo "FAIL: Found active axiom declarations:"
            echo "$AXIOMS"
            exit 1
          fi
          if [ -n "$SORRYS" ]; then
            echo "FAIL: Found active sorry gaps:"
            echo "$SORRYS"
            exit 1
          fi
          echo "PASS: Zero axioms, zero sorrys in Agora/AlienMath/"

      - name: Upload verification reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verification-reports
          path: |
            proof/compilation_report.md
            proof/audit.json
